name: Sub Stream Final
on:
  workflow_dispatch:

jobs:
  run-stream:
    runs-on: ubuntu-latest
    steps:
      - name: Setup
        run: sudo apt-get update && sudo apt-get install -y ffmpeg xvfb chromium-browser

      - name: Launch
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          export DISPLAY=:99
          sleep 5
          
          # Change YOUR_CHANNEL_ID below
          chromium-browser --no-sandbox --window-size=1280,720 --app="https://socialcounts.org/youtube-live-subscriber-count/YOUR_CHANNEL_ID" &
          sleep 20

          # This is the most standard YouTube RTMP link
          ffmpeg -f x11grab -video_size 1280x720 -framerate 30 -i :99 \
            -c:v libx264 -preset veryfast -pix_fmt yuv420p -g 60 -b:v 2500k \
            -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.STREAM_KEY }}"
