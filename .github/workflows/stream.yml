name: Sub Stream V2
on:
  workflow_dispatch:

jobs:
  run-stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install Streamer
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg xvfb chromium-browser

      - name: Start Stream
        run: |
          # 1. Create a virtual screen
          Xvfb :99 -screen 0 1280x720x24 &
          export DISPLAY=:99
          sleep 3

          # 2. Open the Browser (REPLACE YOUR_CHANNEL_ID BELOW)
          chromium-browser \
            --no-sandbox \
            --disable-setuid-sandbox \
            --window-size=1280,720 \
            --force-device-scale-factor=1 \
            --app="https://socialcounts.org/youtube-live-subscriber-count/UCuVDdo8St9REe8waEG8RVkA" &
          
          sleep 15 # Give the website time to load

          # 3. Blast the video to YouTube
          ffmpeg -f x11grab -video_size 1280x720 -framerate 30 -i :99 \
            -c:v libx264 -preset veryfast -pix_fmt yuv420p -g 60 \
            -b:v 3000k -maxrate 3000k -bufsize 6000k \
            -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.STREAM_KEY }}"
